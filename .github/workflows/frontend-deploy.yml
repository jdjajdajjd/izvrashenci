name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: frontend

      - name: Build & transform for Cloudflare Pages
        run: npx @cloudflare/next-on-pages
        working-directory: frontend
        env:
          NEXT_PUBLIC_WORKER_URL: ${{ secrets.WORKER_URL }}

      - name: Create Pages project (first run only)
        run: |
          npx wrangler pages project create dossier-frontend \
            --production-branch main || true
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set nodejs_compat on project
        run: |
          curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/dossier-frontend" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "deployment_configs": {
                "production": {
                  "compatibility_date": "2024-09-23",
                  "compatibility_flags": ["nodejs_compat"]
                },
                "preview": {
                  "compatibility_date": "2024-09-23",
                  "compatibility_flags": ["nodejs_compat"]
                }
              }
            }'

      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler pages deploy .vercel/output/static \
            --project-name dossier-frontend \
            --branch main \
            --commit-dirty=true
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
